  <g stroke="#3d4255" stroke-width="1.5">
    <line x1="11" y1="4" x2="11" y2="28"/>
    <line x1="21" y1="4" x2="21" y2="28"/>
    <line x1="4" y1="11" x2="28" y2="11"/>
    <line x1="4" y1="21" x2="28" y2="21"/>
